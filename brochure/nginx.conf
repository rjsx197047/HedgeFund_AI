# Rendered by the nginx:alpine entrypoint (envsubst) with $PORT injected by
# Railway. Single-page static site: serve files, fall back to index.html.
server {
    listen       ${PORT};
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Long-cache the fingerprinted Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache product screenshots.
    location /shots/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback (the site is a single page, but this keeps deep links safe).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Light security headers for a static brochure.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
