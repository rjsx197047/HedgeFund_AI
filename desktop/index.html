<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP. Permissive enough for Vite's dev HMR (which injects inline
      `<script type="module">` blocks for react-refresh and the HMR
      client) to work in a plain browser. Production builds load only
      bundled scripts and could use a stricter policy — when we ship a
      packaged Electron build we'll tighten this back up via a
      build-time index.html transform or the main-process
      `webRequest.onHeadersReceived` interceptor.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' ws: http: https://*; img-src 'self' data: https:; font-src 'self' data:"
    />
    <title>Trading Agents Lab</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
